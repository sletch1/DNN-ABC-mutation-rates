<text x="60" y="546" font-size="12.5" fill="#1f2937"><tspan font-weight="700">Training:</tspan> GELU activations, no BatchNorm; Adam, 60-epoch MSE warm-up on the mean head, then Gaussian negative log-likelihood; early stopping on validation NLL.</text>
<text x="60" y="566" font-size="12.5" fill="#1f2937"><tspan font-weight="700">Calibration:</tspan> a single conformal scale factor rescales σ so the 95% predictive interval has valid empirical coverage on held-out data.</text>

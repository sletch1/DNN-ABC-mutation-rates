<text x="640" y="267.0" text-anchor="middle" font-size="11.5" fill="#1f2937">SiLU</text>
<text x="640" y="291.0" text-anchor="middle" font-size="11.5" fill="#1f2937">Linear 128</text>
<text x="640" y="315.0" text-anchor="middle" font-size="11.5" fill="#1f2937">LayerNorm</text>

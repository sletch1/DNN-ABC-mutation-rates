<text x="590.0" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">Heteroscedastic residual MLP surrogate (3-D)</text>
<text x="590.0" y="74" text-anchor="middle" font-size="15" fill="#6b7280">inputs  (log&#8321;&#8320;(p), a, &#948;)   &#8594;   two outputs:  mean and log-variance of  log&#8321;&#8320;(d&#772;),   d&#772; = mean&#7522; &#8730;(X&#7522;/Z&#7522;)</text>

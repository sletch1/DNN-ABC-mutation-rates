<text x="1040" y="216" text-anchor="middle" font-size="14" font-weight="700" fill="#1e88e5">&#956;</text>
<text x="1040" y="200" text-anchor="middle" font-size="11.5" fill="#1f2937">mean log&#8321;&#8320;(d&#772;)</text>
<text x="1040" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="#8e44ad">log &#963;&#178;</text>
<text x="1040" y="408" text-anchor="middle" font-size="11.5" fill="#1f2937">log pred. variance</text>
<rect x="40" y="546" width="1100" height="52" rx="10" fill="#f7f9fc" stroke="#e5e9f0" stroke-width="1"/>
<text x="60" y="568" font-size="12.5" fill="#1f2937"><tspan font-weight="700">Structure:</tspan> input projection &#8594; 3 pre-activation residual blocks (width 128, LayerNorm + SiLU, identity skip) &#8594; two linear heads. Depth + skips fit the (p, a, &#948;) interaction surface; LayerNorm (never BatchNorm) avoids the 1-D model&#8217;s batch-noise failure.</text>
<text x="60" y="588" font-size="12.5" fill="#1f2937"><tspan font-weight="700">Training:</tspan> Adam, MSE warm-up on the mean head, then Gaussian NLL; early stopping on val NLL; a single conformal scale factor calibrates &#963; to 95% coverage.</text>
</svg>
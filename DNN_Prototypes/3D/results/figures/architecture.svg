<text x="1050" y="253" text-anchor="middle" font-size="14" font-weight="700" fill="#1e88e5">&#956;</text>
<text x="1050" y="222" text-anchor="middle" font-size="11.5" fill="#1f2937">mean log&#8321;&#8320;(d&#772;)</text>
<text x="1050" y="357" text-anchor="middle" font-size="14" font-weight="700" fill="#8e44ad">&#963;&#178;</text>
<text x="1050" y="384" text-anchor="middle" font-size="11.5" fill="#1f2937">log pred. variance</text>
<rect x="40" y="500" width="1100" height="130" rx="10" fill="#f7f9fc" stroke="#e5e9f0" stroke-width="1"/>
<text x="60" y="522" font-size="12.5" fill="#1f2937"><tspan font-weight="700">Structure:</tspan> input projection → 3 pre-activation residual blocks (width 128, LayerNorm + SiLU, identity skip) → two linear heads. Depth + skips fit the</text>
<text x="60" y="542" font-size="12.5" fill="#1f2937">(p, a, δ) interaction surface; LayerNorm (never BatchNorm) avoids the 1-D model's batch-noise failure.</text>
<text x="60" y="582" font-size="12.5" fill="#1f2937"><tspan font-weight="700">Training:</tspan> Adam, MSE warm-up on the mean head, then Gaussian NLL; early stopping on validation NLL; one conformal scale factor calibrates σ to 95%</text>
<text x="60" y="602" font-size="12.5" fill="#1f2937">coverage.</text>
</svg>